services:

  postgres:
    image: postgres:16
    container_name: citymall-postgres

    environment:
      POSTGRES_DB: customerdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5435:5432"

    volumes:
      - citymall_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: citymall-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@citymall.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    ports:
      - "5050:80"

    depends_on:
      - postgres

volumes:
  citymall_postgres_data: