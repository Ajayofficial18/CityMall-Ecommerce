services:

  postgres:
    image: postgres:16
    container_name: citymall-postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5435:5432"

    volumes:
      - citymall_postgres_data:/var/lib/postgresql/data

    networks:
      - citymall-network

    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4
    container_name: citymall-pgadmin

    environment:
      PGADMIN_DEFAULT_EMAIL: admin@citymall.com
      PGADMIN_DEFAULT_PASSWORD: admin123

    volumes:
      - pgadmin:/var/lib/pgadmin

    networks:
      - citymall-network

    restart: unless-stopped

    ports:
      - "5050:80"

    depends_on:
      - postgres

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_SERVER_ID: 1
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "22181:2181"
    networks:
      - citymall-network
    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: ms_kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - citymall-network
    restart: unless-stopped

  zipkin:
    image: openzipkin/zipkin
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - citymall-network
    restart: unless-stopped

  mail-dev:
    container_name: ms_mail_dev
    image: maildev/maildev
    ports:
      - 1080:1080
      - 1025:1025
    networks:
      - citymall-network
    restart: unless-stopped

networks:
  citymall-network:
    driver: bridge

volumes:
  citymall_postgres_data:
  pgadmin: